var fallbackGame = {
  id: "simple-microgame",
  src: "microgames/simple-microgame.html",
  creator: "Bobby",
  age: 12
};
var manifestPromise = null;
var activeGame = fallbackGame;
var shouldFreezeGame = false;
var roundCount = 0;
var roundStartPromise = Promise.resolve(0);
var pendingRoundStartResolve = null;
var microgameFrame = document.getElementById("microgame-frame");
function getCanvas() {
  return document.querySelector("canvas");
}
function setCanvasInputEnabled(enabled) {
  const canvas = getCanvas();
  if (canvas) {
    canvas.style.pointerEvents = enabled ? "auto" : "none";
  }
}
function setCreatorDetails(entry) {
  if (!entry) {
    return;
  }
  window.postMessage({
    source: "site",
    creator: entry.creator,
    age: entry.age
  }, "*");
}
async function getManifest() {
  if (!manifestPromise) {
    const manifestUrl = new URL("microgames/manifest.json", window.location.href);
    manifestPromise = fetch(manifestUrl).then((response) => {
      if (!response.ok) {
        throw new Error(`Manifest request failed with ${response.status}`);
      }
      return response.json();
    }).catch((error) => {
      console.error("Unable to load microgame manifest.", error);
      return { microgames: [fallbackGame] };
    });
  }
  return manifestPromise;
}
function createRoundStartPromise() {
  roundStartPromise = new Promise((resolve) => {
    pendingRoundStartResolve = resolve;
  });
  return roundStartPromise;
}
function resolveRoundStart(time2) {
  if (pendingRoundStartResolve) {
    pendingRoundStartResolve(time2);
    pendingRoundStartResolve = null;
  }
}
function postToGame(data) {
  microgameFrame?.contentWindow?.postMessage(data, "*");
}
async function loadRound() {
  createRoundStartPromise();
  const manifest = await getManifest();
  const loadedGames = manifest?.microgames;
  activeGame = loadedGames?.length ? loadedGames[Math.floor(Math.random() * loadedGames.length)] : fallbackGame;
  shouldFreezeGame = true;
  roundCount += 1;
  setCreatorDetails(activeGame);
  const gameUrl = new URL(activeGame.src, window.location.href);
  gameUrl.searchParams.set("instance", String(roundCount));
  if (microgameFrame) {
    microgameFrame.src = gameUrl.toString();
  }
}
microgameFrame?.addEventListener("load", () => {
  setCreatorDetails(activeGame);
  postToGame(shouldFreezeGame ? "freeze" : "unfreeze");
});

// virtual:/objects/bottomMenu.js
function addBottomMenu() {
  let stroke = 6;
  const menu = add([
    rect(640 - stroke, 160 - stroke),
    color("#5bc0de"),
    pos(stroke / 2, 640 + stroke / 2),
    z(10),
    outline(stroke, Color.fromHex("#338eda"))
  ]);
  const nameTxt = menu.add([
    text("Creator:---", { align: "left" }),
    pos(20, 33),
    z(menu.z + 1)
  ]);
  const ageTxt = menu.add([
    text("Age:---", { align: "center" }),
    pos(20, 86),
    z(menu.z + 1)
  ]);
  window.addEventListener("message", (event) => {
    if (event.data.source === "site") {
      nameTxt.text = "Creator: " + event.data.creator;
      ageTxt.text = "Age: " + event.data.age;
    } else if (event.data.moment === "end") {
      nameTxt.text = "Creator:---";
      ageTxt.text = "Age:---";
    }
  });
}

// virtual:/utils/orpheus.js
function orpheusLogic() {
  let rocks = 0;
  let rockTime = 0;
  return {
    async jump() {
      this.sprite = "Orpheus_Jump";
      return await tween(this.pos, vec2(center().x, center().y - 170), 0.3, (p) => this.pos = p, easings.easeOutCubic);
    },
    async lose() {
      this.sprite = "Orpheus_Dazed";
      return await this._doRocking(5, 0.2);
    },
    async win() {
      this.sprite = "Orpheus_Happy";
      return await this._doRocking(3, 0.5);
    },
    async _doRocking(numRocks, time2) {
      for (let i = 0; i < numRocks; i++) {
        const targetAngle = i % 2 === 0 ? -15 : 15;
        await tween(
          this.angle,
          targetAngle,
          time2,
          (p) => this.angle = p,
          easings.easeInOutSine
        );
      }
      await tween(
        this.angle,
        0,
        time2 / 2,
        (p) => this.angle = p,
        easings.easeInOutSine
      );
      this.sprite = "Orpheus_Idle";
    }
  };
}

// virtual:/utils/constants.js
var NUM_LIVES = 4;

// virtual:/objects/lives.js
var spacing = 100;
function addLives(menu) {
  const livesGroup = menu.add([
    pos(center().sub(vec2(0, 300))),
    anchor("center")
  ]);
  for (let i = 0; i < NUM_LIVES; i++) {
    livesGroup.add([
      sprite("heart"),
      pos((i - (NUM_LIVES - 1) / 2) * spacing, 0),
      anchor("center"),
      z(6),
      scale(2)
    ]);
  }
  return livesGroup;
}

// virtual:/objects/timer.js
function addTimer() {
  const outerTimer = add([
    rect(600, 30),
    color("#000000"),
    pos(20, 600),
    z(3),
    anchor("left")
  ]);
  const innerTimer = outerTimer.add([
    rect(590, 20),
    color("#33d6a6"),
    pos(5, 0),
    z(4),
    anchor("left")
  ]);
  const resetTimer = () => {
    innerTimer.width = 590;
  };
  const startTimer = (time2) => {
    resetTimer();
    tween(innerTimer.width, 0, time2, (p) => innerTimer.width = p, easings.linear);
  };
  return {
    startTimer,
    resetTimer
  };
}

// virtual:/objects/topMenu.js
function addTopMenu() {
  let lives = 0;
  let score = 0;
  let currentRoundTime = 0;
  let startText = "null";
  let timer = addTimer();
  const play = add([
    sprite("play"),
    z(100),
    pos(center()),
    anchor("center"),
    area(),
    scale(3),
    "play"
  ]);
  const sendControllerState = () => {
    setCanvasInputEnabled(!play.hidden);
    window.parent.postMessage({ source: "controller", playHidden: play.hidden }, "*");
  };
  sendControllerState();
  onClick("play", async (obj) => {
    lives = NUM_LIVES;
    play.hidden = true;
    sendControllerState();
    await wait(1);
    proceed();
  });
  const menu = add([
    rect(640, 640),
    color("#8492a6"),
    pos(0, 0),
    z(5)
  ]);
  const orpheus = menu.add([
    sprite("Orpheus_Idle"),
    pos(center().add(vec2(0, 120))),
    scale(1),
    anchor("center"),
    rotate(0),
    z(7),
    orpheusLogic()
  ]);
  const livesVisuals = addLives(menu);
  const scoreTxt = menu.add([
    text("0", { align: "center", size: 48 }),
    anchor("center"),
    pos(center().sub(vec2(0, 230))),
    z(6)
  ]);
  const slideTo = (targetY) => {
    return tween(menu.pos, vec2(0, targetY), 0.4, (p) => menu.pos = p, easings.easeOutCubic);
  };
  const processResult2 = async (result) => {
    orpheus.pos = center().add(vec2(0, 120));
    slideTo(0);
    if (result === "win") {
      await orpheus.win();
    } else {
      await orpheus.lose();
      livesVisuals.children[lives - 1].sprite = "x";
      lives--;
    }
    proceed();
  };
  const proceed = async () => {
    if (lives > 0) {
      timer.resetTimer();
      score++;
      scoreTxt.text = score;
      await loadRound();
      await orpheus.jump();
      slideTo(1e3);
      await wait(0.4);
      timer.startTimer(await roundStartPromise);
      shouldFreezeGame = false;
      postToGame("unfreeze");
    } else {
      play.hidden = false;
      sendControllerState();
    }
  };
  return {
    menu,
    orpheus,
    slideTo,
    proceed,
    updateTime(nextTime) {
      currentRoundTime = nextTime;
    },
    processResult: processResult2
  };
}
window.addEventListener("message", (event) => {
  if (event.source === microgameFrame?.contentWindow && event.data?.source === "game" && top) {
    if (event.data.moment === "start") {
      top.updateTime(event.data.time);
      resolveRoundStart(event.data.time);
      if (shouldFreezeGame) {
        postToGame("freeze");
      }
    } else {
      top.processResult(event.data.result);
    }
  }
});

// virtual:/scenes/game.js
var top;
scene("game", async () => {
  addBottomMenu();
  top = addTopMenu();
  top.proceed();
});

// virtual:/main.js
go("game");
