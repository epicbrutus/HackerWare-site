// virtual:/utils/CONFIG.js
var DEFAULT_STATE = false;
var TIME = 4;

// virtual:/utils/microgameHandler.js
var winFlag = DEFAULT_STATE;
function setWinFlag(flag) {
  winFlag = flag;
}
async function initialize() {
  window.parent.postMessage({ source: "game", moment: "start", time: TIME }, "*");
  await wait(TIME);
  let finalState = "lose";
  if (winFlag) {
    finalState = "win";
  }
  window.parent.postMessage({ source: "game", moment: "end", result: finalState }, "*");
}
window.addEventListener("message", (event) => {
  if (event.data === "freeze") {
    debug.paused = true;
  } else if (event.data === "unfreeze") {
    debug.paused = false;
  }
});

// virtual:/scenes/game.js
var health = 3;
var max = 0;
var min = 0;
scene("game", () => {
  initialize();
  add([
    sprite("grass")
  ]);
  let target = add([
    sprite("mark"),
    pos(center()),
    scale(3),
    anchor("center"),
    rotate(0),
    area(),
    "target"
  ]);
  max = width() - target.width * target.scale.x;
  min = target.width * target.scale.x;
  onClick("target", async (obj) => {
    health--;
    if (health == 0) {
      addKaboom(target.pos);
      target.destroy();
      setWinFlag(true);
    } else {
      let randomX = Math.floor(Math.random() * (max - min + 1)) + min;
      let randomY = Math.floor(Math.random() * (max - min + 1)) + min;
      target.pos = vec2(randomX, randomY);
    }
  });
});

// virtual:/main.js
go("game");

    </script>
